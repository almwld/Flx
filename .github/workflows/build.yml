name: Build Flx

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Flutter project with correct Gradle setup
        run: |
          mkdir -p /tmp/fresh
          cd /tmp/fresh
          flutter create --org com.flexyemen --project-name flex_app .
          cd $GITHUB_WORKSPACE
          
          # نسخ الملفات المهمة
          cp -r lib /tmp/fresh/
          cp -r assets /tmp/fresh/ 2>/dev/null || true
          cp pubspec.yaml /tmp/fresh/
          cp .env /tmp/fresh/ 2>/dev/null || true
          
          # استبدال المشروع بالكامل
          rm -rf .git lib assets pubspec.yaml .env android ios
          cp -r /tmp/fresh/. .
          
          # إزالة مجلد .git المؤقت
          rm -rf /tmp/fresh

      - name: Fix Gradle settings
        run: |
          # تعديل settings.gradle لاستخدام الإعدادات الحديثة
          cat > android/settings.gradle << 'SETTINGS_EOF'
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.1.0" apply false
          }
          
          include ":app"
          SETTINGS_EOF

      - name: Set app name
        run: |
          sed -i 's/android:label="flex_app"/android:label="Flex Yemen Market"/g' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
