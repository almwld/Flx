name: Build Flex Yemen

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create fresh Android project
        run: |
          mkdir -p /tmp/new
          cd /tmp/new
          flutter create --org com.flexyemen --project-name flex .
          cd $GITHUB_WORKSPACE
          rm -rf android ios
          cp -r /tmp/new/android .
          cp -r /tmp/new/ios .
          rm -rf /tmp/new

      - name: Set app name
        run: sed -i 's/android:label="flex"/android:label="Flex Yemen Market"/g' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/*.apk
