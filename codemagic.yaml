workflows:
  flx-android:
    name: Flx Android Build
    instance_type: mac_mini_m1
    max_build_duration: 30
    environment:
      flutter: stable
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/.gradle/caches
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Create fresh Android project
        script: |
          # إنشاء مشروع Flutter جديد في مجلد مؤقت
          mkdir -p /tmp/fresh_project
          cd /tmp/fresh_project
          flutter create --org com.flexyemen --project-name flx_temp .
          
          # العودة إلى المشروع الأصلي ونسخ ملفات android الجديدة
          cd $CM_BUILD_DIR
          rm -rf android ios
          cp -r /tmp/fresh_project/android .
          cp -r /tmp/fresh_project/ios .
          
          # تنظيف الملفات المؤقتة
          rm -rf /tmp/fresh_project
      
      - name: Get Flutter packages
        script: |
          flutter pub get
      
      - name: Build APK
        script: |
          flutter build apk --release --split-per-abi
      
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true
